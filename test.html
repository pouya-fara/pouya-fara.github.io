<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfectly Centered Scroll Snap</title>
    <style>
        /* Make body full height and prevent overflow issues */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        /* The scrollable container */
        .scroll-container {
            height: 100vh; /* Full screen height */
            overflow-y: auto; /* Enable scrolling */
            scroll-snap-type: y mandatory; /* Force snapping */
            scrollbar-width: none; /* Hide scrollbar in Firefox */
        }

        /* Hide scrollbar in Chrome/Safari */
        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        /* Each section is full screen and centered properly */
        .section {
            height: 100vh; /* Full viewport height */
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center; /* Centers vertically */
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            scroll-snap-align: start; /* Snaps each section to the top */
        }

        /* Different background colors */
        .section:nth-child(1) { background: lightblue; }
        .section:nth-child(2) { background: lightcoral; }
        .section:nth-child(3) { background: lightgreen; }
        .section:nth-child(4) { background: lightsalmon; }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="section">🚀 Section 1</div>
        <div class="section">🎯 Section 2</div>
        <div class="section">🔥 Section 3</div>
        <div class="section">✅ Section 4</div>
    </div>

</body>
</html>
